name: attendance_mobile
description: A secure, geo-fenced mobile attendance client.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  geolocator: ^12.0.0
  local_auth: ^2.2.0
  device_info_plus: ^10.1.0
  ntp: ^2.0.0
  dio: ^5.4.0
  intl: ^0.19.0
  logger: ^2.4.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.0
  connectivity_plus: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/logo.jpeg"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.jpeg"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.jpeg
